name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  # 后端检查
  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          cd backend
          python -m py_compile main.py
          python -m py_compile config.py
          python -m py_compile database.py
          python -m py_compile init_db.py

  # 前端检查
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build check
        run: |
          cd frontend
          npm run build

  # 部署到服务器
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 检查项目目录是否存在
            if [ ! -d "/root/big_files" ]; then
              echo "📥 首次部署，克隆仓库..."
              cd /root
              git clone https://github.com/Z-Jean/big_files.git
              cd big_files
            else
              echo "📥 更新代码..."
              cd /root/big_files
              git pull origin main
            fi

            # 执行部署脚本
            chmod +x deploy.sh
            ./deploy.sh
